<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экзамен ГПК: 30 билетов ЭБ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f7fa; color: #333; }
        .gpk-blue { background-color: #0056b3; } 
        .gpk-text-blue { color: #0056b3; }
        .card-gpk { background: #ffffff; border-radius: 16px; border: 1px solid #e0e6ed; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .ans-btn { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; transition: all 0.2s ease; width: 100%; text-align: left; padding: 1rem; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.75rem; line-height: 1.2; }
        .ans-btn:hover { border-color: #0056b3; background: #ebf4ff; color: #0056b3; }
        .flash-red { animation: flash 0.4s ease-out; }
        @keyframes flash { 0% { background: #fff; } 50% { background: #fee2e2; } 100% { background: #fff; } }
    </style>
</head>
<body id="body" class="min-h-screen flex flex-col">

    <audio id="snd-ok" src="https://www.soundjay.com"></audio>
    <audio id="snd-err" src="https://www.myinstants.com"></audio>

    <div class="max-w-xl mx-auto w-full p-4 md:p-8 flex-grow flex flex-col">
        <header class="text-center mb-6">
            <div class="inline-block p-2 bg-white rounded-lg shadow-sm mb-2">
                <span class="text-2xl font-black gpk-text-blue">ГПК</span>
            </div>
            <h1 class="text-lg font-extrabold gpk-text-blue uppercase leading-tight">Глазовский политехнический колледж</h1>
        </header>

        <div id="auth" class="flex-grow flex flex-col justify-center">
            <div class="card-gpk p-8 space-y-6">
                <h2 class="text-xl font-bold text-center text-gray-800 uppercase italic text-sm">Экзаменационная аттестация (2 группа)</h2>
                <div class="space-y-4">
                    <input type="text" id="student-name" class="w-full p-4 border-2 rounded-xl focus:border-blue-600 outline-none" placeholder="Фамилия Имя Отчество">
                    <input type="text" id="student-group" class="w-full p-4 border-2 rounded-xl focus:border-blue-600 outline-none" placeholder="Группа">
                </div>
                <button onclick="startApp()" class="w-full gpk-blue text-white font-bold py-5 rounded-xl shadow-lg hover:opacity-90 transform active:scale-95 transition uppercase tracking-tight">Сгенерировать билет</button>
            </div>
        </div>

        <div id="quiz" class="hidden flex-grow space-y-4">
            <div class="flex justify-between items-end px-1">
                <div>
                    <p id="display-info" class="text-[10px] font-bold text-gray-400 italic mb-1 uppercase"></p>
                    <span id="ticket-num" class="text-xs font-bold text-blue-600 uppercase tracking-widest font-mono">Билет №</span>
                </div>
                <span class="text-xs font-bold text-gray-400 uppercase text-right">Вопрос<br><span id="progress-text" class="text-blue-600 text-lg">1/10</span></span>
            </div>
            <div class="w-full h-2 bg-gray-200 rounded-full overflow-hidden">
                <div id="bar" class="h-full gpk-blue rounded-full transition-all duration-500" style="width: 10%"></div>
            </div>
            <div class="card-gpk p-6 min-h-[140px] flex items-center shadow-lg">
                <p id="q-text" class="text-lg font-semibold text-gray-800 leading-tight"></p>
            </div>
            <div id="ans-box" class="pb-8"></div>
        </div>

        <div id="result" class="hidden text-center py-6">
            <div class="card-gpk p-8 border-t-8 shadow-2xl" id="res-border">
                <div id="res-icon" class="text-6xl mb-4"></div>
                <h2 id="res-status" class="text-3xl font-black mb-2 uppercase italic tracking-tighter text-gray-800"></h2>
                <div id="res-score" class="text-7xl font-black gpk-text-blue mb-4 tracking-tighter">0/10</div>
                <div class="border-t border-b border-gray-100 py-6 text-left space-y-3 mb-6 text-gray-800 text-xs">
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase font-bold">Студент:</p>
                        <p id="final-name" class="font-bold text-gray-900 text-sm leading-tight"></p>
                        <p id="final-group" class="text-gray-600 font-semibold"></p>
                    </div>
                    <div class="pt-4 flex justify-between items-center border-t border-gray-50 mt-2">
                        <span class="text-[9px] text-gray-300 font-mono">ID: <span id="session-id" class="font-bold text-gray-500"></span></span>
                        <span id="current-date" class="text-[9px] text-gray-300 font-mono italic"></span>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-600 font-bold py-4 rounded-xl hover:bg-gray-200 transition uppercase tracking-widest text-xs">Новая попытка</button>
            </div>
        </div>
    </div>

    <script>
        const allQuestions = [
            {q:"Какая периодичность проверки знаний персонала, обслуживающего электроустановки?", a:["Не реже 1 раза в год", "Раз в полгода", "Раз в 3 года"], c:0},
            {q:"Минимальное количество членов комиссии по проверке знаний?", a:["3 человека", "5 человек", "2 человека"], c:0},
            {q:"Какое напряжение считается безопасным в особо опасных помещениях?", a:["12 В", "50 В", "110 В"], c:0},
            {q:"Кто имеет право проводить инструктаж на 1 группу ЭБ?", a:["Работник с группой не ниже 3", "Мастер цеха", "Студент 4 курса"], c:0},
            {q:"Цвет жилы защитного заземления (PE)?", a:["Желто-зеленый", "Синий", "Красный"], c:0},
            {q:"Радиус зоны шагового напряжения?", a:["8 метров", "2 метра", "20 метров"], c:0},
            {q:"Для чего предназначено УЗО?", a:["От утечки тока на землю", "От перегрузки", "От короткого замыкания"], c:0},
            {q:"Как проверить перчатки на прокол?", a:["Скручиванием", "На свет", "Водой"], c:0},
            {q:"Первое действие при ударе током?", a:["Обесточить установку", "Вызвать скорую", "Делать ИВЛ"], c:0},
            {q:"Как выходить из зоны обрыва провода?", a:["Гусиным шагом", "Бегом", "Прыжками"], c:0},
            {q:"Смертельный ток для человека?", a:["100 мА", "10 мА", "50 мА"], c:0},
            {q:"Допускается ли использование контрольных ламп выше 220В?", a:["Запрещено", "Разрешено", "С разрешения мастера"], c:0},
            {q:"На какой срок выдается распоряжение?", a:["1 рабочий день", "5 дней", "15 дней"], c:0},
            {q:"Кто является ответственным за выдачу наряда?", a:["Лицо из АТП", "Производитель работ", "Допускающий"], c:0},
            {q:"Периодичность проверки электроинструмента?", a:["Раз в 6 месяцев", "Раз в год", "Раз в месяц"], c:0},
            {q:"Минимальный возраст для 2 группы?", a:["18 лет", "16 лет", "21 год"], c:0},
            {q:"Можно ли работать одному в электроустановках?", a:["Нет", "Да", "С разрешения мастера"], c:1},
            {q:"Чем тушить электрощит под напряжением?", a:["Углекислотным огнетушителем", "Водой", "Пенным огнетушителем"], c:0},
            {q:"Где проверять пульс у пострадавшего?", a:["На сонной артерии", "На запястье", "На виске"], c:0},
            {q:"Что такое заземление?", a:["Связь корпуса с землей", "Связь с нулем", "Изоляция пола"], c:0},
            {q:"Срок действия наряда?", a:["15 календарных дней", "5 дней", "30 дней"], c:0},
            {q:"Класс защиты инструмента с двойной изоляцией?", a:["II класс", "I класс", "III класс"], c:0},
            {q:"На какой высоте работа считается верхолазной?", a:["Выше 5 метров", "Выше 2 метров", "Выше 10 метров"], c:0},
            {q:"Допустимое время наложения жгута летом?", a:["Не более 1 часа", "2 часа", "30 минут"], c:0},
            {q:"Какие знаки запрещают работу под напряжением?", a:["Запрещающие", "Предупреждающие", "Указательные"], c:0}
        ];

        let ticketsData = [];
        for(let i=1; i<=30; i++) {
            let ticketQs = [];
            let pool = [...allQuestions];
            for(let j=0; j<10; j++) {
                let idx = Math.floor(Math.random() * pool.length);
                ticketQs.push(pool.splice(idx, 1)[0]);
            }
            ticketsData.push({ id: i, questions: ticketQs });
        }

        let currentTest = [], currentIdx = 0, score = 0, studentData = {};

        function startApp() {
            const name = document.getElementById('student-name').value.trim();
            const group = document.getElementById('student-group').value.trim();
            if(name.length < 5 || group.length < 2) { alert("Заполните ФИО и группу!"); return; }
            studentData = { name, group };
            const ticket = ticketsData[Math.floor(Math.random() * ticketsData.length)];
            currentTest = ticket.questions;
            document.getElementById('ticket-num').innerText = `Билет №${ticket.id}`;
            document.getElementById('display-info').innerText = `${name} | ${group}`;
            show('quiz');
            render();
        }

        function render() {
            const data = currentTest[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1}/10`;
            document.getElementById('bar').style.width = ((currentIdx + 1) * 10) + '%';
            document.getElementById('q-text').innerText = data.q;
            const box = document.getElementById('ans-box');
            box.innerHTML = '';
            data.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = "ans-btn shadow-sm";
                btn.innerText = txt;
                btn.onclick = () => {
                    if(i === data.c) { score++; document.getElementById('snd-ok').play(); }
                    else { 
                        document.getElementById('snd-err').play(); 
                        document.getElementById('body').classList.add('flash-red');
                        setTimeout(() => document.getElementById('body').classList.remove('flash-red'), 400);
                    }
                    currentIdx++;
                    if(currentIdx < 10) render(); else finish();
                };
                box.appendChild(btn);
            });
        }

        function finish() {
            show('result');
            const win = score >= 8;
            document.getElementById('res-score').innerText = `${score}/10`;
            document.getElementById('res-status').innerText = win ? "АТТЕСТОВАН" : "НЕ СДАНО";
            document.getElementById('res-status').style.color = win ? "#16a34a" : "#dc2626";
            document.getElementById('res-border').style.borderTopColor = win ? "#16a34a" : "#dc2626";
            document.getElementById('res-icon').innerText = win ? "✅" : "⚠️";
            document.getElementById('final-name').innerText = studentData.name;
            document.getElementById('final-group').innerText = studentData.group;
            document.getElementById('session-id').innerText = Math.random().toString(36).substring(2, 8).toUpperCase();
            document.getElementById('current-date').innerText = new Date().toLocaleString();
        }

        function show(id) {
            ['auth', 'quiz', 'result'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
